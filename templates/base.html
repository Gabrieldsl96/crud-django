<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}CRUD Básico{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md">
      <div
        class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <a href="/" class="text-xl font-bold tracking-tight">CRUD Básico</a>
        <div class="flex gap-6">
          <a
            href="{% url 'usuarios:lista' %}"
            class="hover:text-blue-200 transition-colors font-medium"
            >Usuários</a
          >
          <a
            href="{% url 'produtos:lista' %}"
            class="hover:text-blue-200 transition-colors font-medium"
            >Produtos</a
          >
        </div>
      </div>
    </nav>

    <!-- Mensagens -->
    {% if messages %}
    <div class="max-w-6xl mx-auto px-4 mt-4">
      {% for message in messages %}
      <div
        class="rounded-lg px-4 py-3 mb-2 {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-300 {% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-300 {% else %}bg-blue-100 text-blue-800 border border-blue-300{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Conteúdo -->
    <main class="max-w-6xl mx-auto px-4 py-8">
      {% block conteudo %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer
      class="text-center text-gray-400 text-sm py-6 mt-8 border-t border-gray-200"
    >
      CRUD Básico &mdash; Django + Tailwind + PostgreSQL
    </footer>
  </body>
</html>
