{% extends 'base.html' %}

{% block titulo %}Excluir Produto{% endblock %}

{% block conteudo %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="h-1 bg-red-500"></div>
    <div class="p-8 text-center">
      <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5">
        <svg class="w-7 h-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-slate-800 mb-2">Excluir Produto</h1>
      <p class="text-slate-500 text-sm mb-6">
        Tem certeza que deseja excluir o produto <strong class="text-slate-800">{{ produto.nome }}</strong>?<br>
        Esta ação não pode ser desfeita.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="flex gap-3 justify-center">
          <button type="submit"
                  class="inline-flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Sim, excluir
          </button>
          <a href="{% url 'produtos:lista' %}"
             class="inline-flex items-center px-5 py-2 rounded-lg text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
