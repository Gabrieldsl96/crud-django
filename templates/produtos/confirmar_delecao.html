{% extends 'base.html' %} {% block titulo %}Excluir Produto{% endblock %} {%
block conteudo %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-xl shadow p-8 text-center">
    <div class="text-red-500 text-5xl mb-4">&#9888;</div>
    <h1 class="text-xl font-bold text-gray-800 mb-2">Excluir Produto</h1>
    <p class="text-gray-600 mb-6">
      Tem certeza que deseja excluir o produto
      <strong>{{ produto.nome }}</strong>? Esta ação não pode ser desfeita.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-3 justify-center">
        <button
          type="submit"
          class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg font-medium transition-colors"
        >
          Sim, excluir
        </button>
        <a
          href="{% url 'produtos:lista' %}"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2 rounded-lg font-medium transition-colors"
        >
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
